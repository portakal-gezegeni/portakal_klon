<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portakal Klonu - Llama 3.3 Zekası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {
    apiKey: "AIzaSyCG_3wdb1XW1i8RTpo082-ip0rfCC-iXpo",
    authDomain: "portakal1klon.firebaseapp.com",
    projectId: "portakal1klon",
    storageBucket: "portakal1klon.firebasestorage.app",
    messagingSenderId: "39781652671",
    appId: "1:39781652671:web:5ed9037e155755b74bce0a"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
  
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'portakal-klon-v5'; 
    let ADMIN_KEY = "admin.123"; 
  
    let memories = [];
    let chatHistory = [];
    let isBusy = false;
    let currentKey = "";
    let groqVaultKeys = []; 
    let keyIndex = 0;
    let timeLeft = 1800; 
    let timerInterval = null;
    let unsubscribeMemories = null;
    let isAdmin = false;
  
    const loadConfigs = async () => {
        try {
            const vaultDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'vault'));
            if (vaultDoc.exists()) {
                groqVaultKeys = vaultDoc.data().keys || [];
                document.getElementById('vault-input-key').value = groqVaultKeys.join(', ');
            }
            const adminDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin'));
            if (adminDoc.exists()) ADMIN_KEY = adminDoc.data().password || "admin.123.";
        } catch (e) { console.error("Konfigürasyon okuma hatası"); }
    };
  
    window.saveVaultKey = async () => {
        const keyInput = document.getElementById('vault-input-key').value.trim();
        if(!keyInput) return;
        const keysArray = keyInput.split(',').map(k => k.trim()).filter(k => k);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'vault'), { keys: keysArray });
        groqVaultKeys = keysArray;
        document.getElementById('vault-modal').classList.add('hidden');
        showModal("Başarılı", `${keysArray.length} adet zeka anahtarı kasaya kilitlendi.`);
    };
  
    window.changeAdminPass = async () => {
        const newPass = prompt("Yeni Yönetici (Admin) şifresini belirleyin:");
        if (newPass === null) return;
        const trimmedPass = newPass.trim();
        if (trimmedPass.length >= 4) {
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin'), { 
                    password: trimmedPass 
                });
                ADMIN_KEY = trimmedPass;
                showModal("Başarılı", "Yönetici şifresi başarıyla güncellendi.");
            } catch (e) {
                showModal("Hata", "Şifre güncellenirken bir sorun oluştu.");
            }
        } else {
            showModal("Hata", "Şifre en az 4 karakter olmalıdır.");
        }
    };
  
    const getNextKey = () => {
        if (groqVaultKeys.length === 0) return null;
        const key = groqVaultKeys[keyIndex];
        keyIndex = (keyIndex + 1) % groqVaultKeys.length;
        return key;
    };
  
    window.deleteClone = async (id) => {
        if (!id) return;
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 z-[6000] flex items-center justify-center bg-black/90 p-4";
        modal.innerHTML = `
            <div class="bg-slate-900 p-6 rounded-2xl max-w-xs w-full text-center border border-red-500/30">
                <h3 class="text-red-500 font-bold mb-2">Klonu Sil</h3>
                <p class="text-xs text-slate-300 mb-4"><span class="font-bold text-white">${id}</span> klonu kalıcı silinecek.</p>
                <div class="flex gap-2">
                    <button id="cancel-btn" class="w-1/2 py-2 bg-slate-800 rounded-xl text-white font-bold text-sm">İPTAL</button>
                    <button id="confirm-btn" class="w-1/2 py-2 bg-red-600 rounded-xl text-white font-bold text-sm">SİL</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('cancel-btn').onclick = () => modal.remove();
        document.getElementById('confirm-btn').onclick = async () => {
            modal.remove();
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clones', id));
                showModal("Başarılı", "Klon silindi.");
            } catch(e) {
                showModal("Hata", "Klon silinemedi.");
            }
        };
    };
  
    window.deleteMemoryItem = async (cloneId, index) => {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', cloneId);
        const snap = await getDoc(docRef);
        if(snap.exists()){
            let list = snap.data().list || [];
            list.splice(index, 1);
            await updateDoc(docRef, { list });
        }
    };
  
    window.loadClone = async () => {
        const key = document.getElementById('secretKey').value.trim();
        if(!key || key.length < 3) return showModal("Hata", "Şifre çok kısa.");
  
        const btn = document.querySelector('.btn-start');
        btn.innerText = "BAĞLANIYOR...";
        btn.disabled = true;
  
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch(e) {
            showModal("Hata", "Bağlantı kurulamadı.");
            btn.innerText = "BAŞLAT";
            btn.disabled = false;
            return;
        }
  
        await loadConfigs();
  
        if (key === ADMIN_KEY) {
            isAdmin = true;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('admin-panel').classList.remove('hidden');
            startAdminListener();
            return;
        }
  
        currentKey = key;
        const memoryDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', currentKey);
        const initialSnap = await getDoc(memoryDocRef);
        if (!initialSnap.exists()) {
            await setDoc(memoryDocRef, { list: [], messages: [], created: new Date() });
        } else if (!initialSnap.data().messages) {
            await updateDoc(memoryDocRef, { messages: [] });
        }
  
        if (initialSnap.exists()) {
            chatHistory = initialSnap.data().messages || [];
        }
  
        document.getElementById('auth-overlay').style.display = 'none';
        startTimer();
  
        unsubscribeMemories = onSnapshot(memoryDocRef, (snap) => {
            if(snap.exists()){
                memories = snap.data().list || [];
                chatHistory = snap.data().messages || [];
                refreshMemoryList();
            }
        }, (err) => console.error("Hafıza akış hatası", err));
  
        respond("Uyandım... Ama hiçbir şey hatırlamıyorum. Kimim ben? Bana her şeyi öğretmelisin.");
    };
  
    window.startProcess = async () => {
        if (isBusy || !currentKey) return;
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
  
        const apiKey = getNextKey();
        if(!apiKey) {
            document.getElementById('vault-modal').classList.remove('hidden');
            return;
        }
  
        isBusy = true; 
        document.querySelector('.btn-send').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { 
                            role: "system", 
                            content: `Sen hafızasını tamamen kaybetmiş 'Portakal'sın. KURALLAR: 1. Sadece HAFIZA listene güven. 2. Bilmediğin şeyi dürüstçe söyle. 3. Yeni bilgi verilirse 'fact' alanına yaz. ŞU ANKİ HAFIZAN: [${memories.join(" | ") || "Boş"}] Format: {"type": "learn" veya "question", "response": "cevap", "fact": "kısa bilgi"} Yanıtını her zaman json formatında ver.` 
                        },
                        { role: "user", content: text }
                    ],
                    response_format: { type: "json_object" }
                })
            });
  
            const data = await response.json();
            const res = JSON.parse(data.choices[0].message.content);
            const memoryDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', currentKey);
  
            const newMessages = [
                ...chatHistory,
                { role: "user", content: text, time: new Date().toISOString() },
                { role: "assistant", content: res.response, time: new Date().toISOString() }
            ];
  
            if(res.type === "learn" && res.fact) {
                await updateDoc(memoryDocRef, { 
                    list: [...memories, res.fact],
                    messages: newMessages
                });
            } else {
                await updateDoc(memoryDocRef, { messages: newMessages });
            }
  
            chatHistory = newMessages;
            respond(res.response);
  
        } catch(e) { 
            respond("Zihnimde bir boşluk hissettim.");
        }
  
        isBusy = false;
        document.querySelector('.btn-send').innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
        input.value = "";
    };
  
    function refreshMemoryList() {
        const listEl = document.getElementById('memory-list');
        listEl.innerHTML = memories.length > 0 
            ? memories.slice().reverse().map(m => `<div class="p-3 bg-white/5 rounded-lg text-xs mb-2 border-l-2 border-orange-500 animate-fadeIn">${m}</div>`).join("")
            : `<div class="text-slate-500 text-xs text-center py-4">Beynim şu an bomboş...</div>`;
        document.getElementById('mem-count').innerText = memories.length;
    }
  
    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) { logout(); return; }
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const el = document.getElementById('timer-val');
            if(el) el.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }
  
    window.logout = () => { location.reload(); };
  
    function respond(text) {
        const bubble = document.getElementById('chat-bubble');
        bubble.innerText = text;
        bubble.style.display = 'block';
        const brows = document.querySelectorAll('.brow');
        brows.forEach(b => b.classList.add('surprised'));
        fallbackSpeech(text);
        setTimeout(() => {
            bubble.style.display = 'none';
            brows.forEach(b => b.classList.remove('surprised'));
        }, 6000);
    }
  
    const fallbackSpeech = (text) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'tr-TR'; u.pitch = 1.2; u.rate = 1;
        const mouth = document.getElementById('mouth');
        u.onstart = () => mouth && mouth.classList.add('talking');
        u.onend = () => mouth && mouth.classList.remove('talking');
        window.speechSynthesis.speak(u);
    };
  
    function showModal(title, text) {
        const m = document.createElement('div');
        m.className = "fixed inset-0 z-[5000] flex items-center justify-center bg-black/90 p-4";
        m.innerHTML = `<div class="bg-slate-900 p-6 rounded-2xl max-w-xs w-full text-center border border-orange-500/30">
            <h3 class="text-orange-500 font-bold mb-2">${title}</h3>
            <p class="text-xs text-slate-300 mb-4">${text}</p>
            <button onclick="this.parentElement.parentElement.remove()" class="w-full py-2 bg-orange-600 rounded-xl text-white font-bold">TAMAM</button>
        </div>`;
        document.body.appendChild(m);
    }
  
    document.addEventListener('mousemove', (e) => {
        const pupils = document.querySelectorAll('.pupil');
        pupils.forEach(p => {
            const rect = p.parentElement.getBoundingClientRect();
            const angle = Math.atan2(e.clientY - (rect.top + rect.height / 2), e.clientX - (rect.left + rect.width / 2));
            p.style.transform = `translate(${Math.cos(angle)*5}px, ${Math.sin(angle)*5}px)`;
        });
    });
  
    window.onload = () => {
        const container = document.getElementById('star-container');
        for (let i = 0; i < 70; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = (Math.random()*2+1)+'px';
            s.style.setProperty('--d', (Math.random()*4+2)+'s');
            container.appendChild(s);
        }
    };
  
    window.tickle = () => {
        const c = document.getElementById('orange-container');
        c.classList.add('laughing');
        const brows = document.querySelectorAll('.brow');
        brows.forEach(b => b.classList.add('laugh-brow'));
        respond("Hahaha! Gıdıklanıyorum!");
        setTimeout(() => {
            c.classList.remove('laughing');
            brows.forEach(b => b.classList.remove('laugh-brow'));
        }, 1000);
    };
  
    window.toggleMemory = () => { document.getElementById('memory-panel').classList.toggle('active'); document.getElementById('memory-overlay').classList.toggle('active'); };
    window.openVault = () => document.getElementById('vault-modal').classList.remove('hidden');
  
    function startAdminListener() {
        const adminList = document.getElementById('admin-clone-list');
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clones'), (snap) => {
            adminList.innerHTML = "";
            if(snap.empty) {
                adminList.innerHTML = '<div class="text-slate-500 text-center p-10">Henüz hiç klon yok.</div>';
                return;
            }
            snap.forEach(d => {
                const data = d.data();
                const cloneMemories = data.list || [];
                const card = document.createElement('div');
                card.className = "bg-white/5 border border-white/10 p-5 rounded-[2rem] mb-6 animate-fadeIn";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-orange-500 font-black text-xl tracking-tight">#${d.id}</h3>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Klon Hafızası</p>
                        </div>
                        <button onclick="window.deleteClone('${d.id}')" class="px-4 py-2 bg-red-600/10 text-red-500 text-xs rounded-xl font-bold border border-red-500/20 hover:bg-red-600 hover:text-white transition-all">
                            <i class="fa-solid fa-trash-can mr-2"></i>KLONU SİL
                        </button>
                    </div>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-2">Hafıza Verileri (${cloneMemories.length})</p>
                    <div class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-2 mb-4">
                        ${cloneMemories.length > 0 ? cloneMemories.map((m, idx) => `
                            <div class="flex justify-between items-center gap-3 p-3 bg-black/40 rounded-xl border border-white/5">
                                <span class="text-xs text-slate-300 flex-grow">${m}</span>
                                <button onclick="window.deleteMemoryItem('${d.id}', ${idx})" class="text-slate-500 hover:text-red-400 transition-colors">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>`).join('') : '<p class="text-center text-xs text-slate-600 py-2 italic">Hafıza boş.</p>'}
                    </div>`;
                adminList.appendChild(card);
            });
        }, (err) => console.error("Admin dinleme hatası", err));
    }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap');
    body { font-family: 'Space Grotesk', sans-serif; background: #020617; margin: 0; overflow: hidden; display: flex; height: 100vh; color: white; }
    .space-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .top-bar { position: fixed; top: 15px; right: 15px; display: flex; align-items: center; gap: 10px; z-index: 1000; }
    .memory-panel { width: 320px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 24px; z-index: 150; transition: transform 0.4s ease; position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
    .memory-panel.active { transform: translateX(0); }
    .memory-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 140; }
    .memory-overlay.active { display: block; }
    .main-stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
    .orange-container { position: relative; width: 220px; height: 220px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .stem { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 12px; height: 35px; background: #4d2c19; border-radius: 4px; z-index: 5; }
    .leaf { position: absolute; top: -30px; left: 55%; width: 45px; height: 25px; background: linear-gradient(to right, #22c55e, #16a34a); border-radius: 0 50% 0 50%; transform: rotate(15deg); box-shadow: 2px 2px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    .orange-body { width: 100%; height: 100%; background: linear-gradient(135deg, #fb923c, #f97316); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 60px rgba(249, 115, 22, 0.3); border: 4px solid rgba(255,255,255,0.1); }
    .brows-container { position: absolute; top: 45px; width: 120px; display: flex; justify-content: space-between; padding: 0 5px; z-index: 20; }
    .brow { width: 35px; height: 6px; background: #440000; border-radius: 3px; transition: all 0.3s ease; }
    .brow-left { transform: rotate(-10deg); }
    .brow-right { transform: rotate(10deg); }
    .brow.surprised { transform: translateY(-10px) rotate(0deg); height: 4px; }
    .brow.laugh-brow { transform: translateY(5px) rotate(20deg); }
    .brow-left.laugh-brow { transform: translateY(5px) rotate(-20deg); }
    .eye { width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 10px; position: relative; border: 2px solid rgba(0,0,0,0.1); }
    .pupil { width: 18px; height: 18px; background: #0f172a; border-radius: 50%; transition: transform 0.1s linear; }
    .mouth { position: absolute; bottom: 45px; width: 44px; height: 6px; border-bottom: 4px solid #440000; border-radius: 0 0 50% 50%; transition: all 0.1s; }
    .mouth.talking { height: 18px; border-radius: 50%; background: #440000; animation: talk 0.2s infinite; }
    @keyframes talk { 0% { transform: scaleY(0.7); } 100% { transform: scaleY(1.2); } }
    .bubble { background: white; color: #0f172a; padding: 15px 22px; border-radius: 24px; position: absolute; top: -120px; width: 280px; text-align: center; display: none; font-weight: 600; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 3px solid #f97316; z-index: 100; }
    .input-area { position: absolute; bottom: 40px; width: 90%; max-width: 500px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 8px; border-radius: 24px; display: flex; border: 1px solid rgba(255,255,255,0.1); gap: 8px; }
    input { flex-grow: 1; border: none; outline: none; padding: 12px 15px; background: transparent; color: white; font-size: 16px; }
    .btn-send { background: #f97316; color: white; width: 48px; height: 48px; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .laughing { animation: shake 0.1s infinite; }
    @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, 2px); } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.3); border-radius: 10px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease forwards; }
    @media (max-width: 768px) { .memory-panel { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); } .memory-panel.active { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="space-bg" id="star-container"></div>
    <div class="top-bar">
        <div class="bg-black/40 backdrop-blur-md border border-white/10 px-4 py-2 rounded-2xl text-xs font-bold text-orange-400">
            <i class="fa-solid fa-cloud-bolt mr-2"></i><span id="timer-val">30:00</span>
        </div>
        <button onclick="logout()" class="bg-red-500/20 border border-red-500/40 w-10 h-10 rounded-2xl text-red-400 hover:bg-red-500 transition-all flex items-center justify-center">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="fixed inset-0 bg-slate-950/98 z-[2500] hidden flex flex-col p-6 overflow-y-auto custom-scrollbar">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-white/10 pb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-black text-orange-500 tracking-tighter">YÖNETİM ÜSSÜ</h1>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em]">Hafıza & Klon Denetimi</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.openVault()" class="px-5 py-3 bg-white/5 border border-white/10 text-white font-bold rounded-2xl text-xs hover:bg-white/10 transition-all">
                        <i class="fa-solid fa-key mr-2 text-orange-500"></i>API KEY GÜNCELLE
                    </button>
                    <button onclick="window.changeAdminPass()" class="px-5 py-3 bg-white/5 border border-white/10 text-white font-bold rounded-2xl text-xs hover:bg-white/10 transition-all">
                        <i class="fa-solid fa-shield-halved mr-2 text-orange-500"></i>ŞİFRE DEĞİŞTİR
                    </button>
                    <button onclick="logout()" class="px-5 py-3 bg-red-600 text-white font-bold rounded-2xl text-xs hover:bg-red-700 transition-all">PANELDEN ÇIK</button>
                </div>
            </div>
            <div id="admin-clone-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <!-- Vault Modal -->
    <div id="vault-modal" class="fixed inset-0 bg-black/90 z-[3000] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] max-w-sm w-full border border-orange-500/30 text-center">
            <div class="w-16 h-16 bg-orange-600 rounded-full flex items-center justify-center text-white mx-auto mb-6">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <h2 class="text-xl font-black text-white mb-2">GİZLİ KASA</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest font-bold">Birden fazla anahtar için araya virgül koyun</p>
            <input type="password" id="vault-input-key" placeholder="Key 1, Key 2, Key 3..." class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white text-sm mb-4 outline-none focus:border-orange-500">
            <div class="flex gap-2">
                <button onclick="document.getElementById('vault-modal').classList.add('hidden')" class="w-1/3 py-4 bg-slate-800 text-white rounded-xl font-bold">İPTAL</button>
                <button onclick="saveVaultKey()" class="w-2/3 py-4 bg-orange-600 text-white rounded-xl font-bold hover:bg-orange-500">KAYDET</button>
            </div>
        </div>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-950 z-[2000] flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center">
            <div class="flex justify-center mb-10">
                <div class="orange-container scale-75 rotate-12">
                    <div class="stem"></div><div class="leaf"></div>
                    <div class="orange-body border-2">
                        <div class="brows-container">
                            <div class="brow brow-left"></div>
                            <div class="brow brow-right"></div>
                        </div>
                        <div class="flex"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                        <div class="mouth"></div>
                    </div>
                </div>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-tighter">KLON SİSTEMİ</h1>
            <p class="text-slate-400 mb-10 text-sm">Bir şifre gir ve klonunu Llama 3 ile eğit.</p>
            <div class="space-y-4">
                <input type="password" id="secretKey" placeholder="Hafıza Şifresi" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 text-center text-xl tracking-[0.5em] outline-none text-white focus:border-orange-500">
                <button class="btn-start w-full bg-orange-600 p-5 rounded-2xl font-bold text-lg text-white" onclick="loadClone()">BAŞLAT</button>
            </div>
        </div>
    </div>
<div class="memory-overlay" id="memory-overlay" onclick="toggleMemory()"></div>
    <!-- Memory Panel -->
    <div class="memory-panel" id="memory-panel">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-brain text-orange-500"></i>
                <h2 class="text-xl font-bold">Hafıza</h2>
            </div>
            <div class="bg-orange-600/20 text-orange-500 px-3 py-1 rounded-lg font-bold text-sm" id="mem-count">0</div>
        </div>
        <div id="memory-list" class="overflow-y-auto space-y-3 flex-grow pr-2 custom-scrollbar"></div>
    </div>

    <!-- Main Chat Stage -->
    <div class="main-stage">
        <button class="md:hidden absolute top-4 left-4 z-50 p-4 bg-orange-600 rounded-2xl text-white" onclick="toggleMemory()">
            <i class="fa-solid fa-brain"></i>
        </button>
        <div class="relative">
            <div class="bubble" id="chat-bubble"></div>
            <div class="orange-container" id="orange-container" onclick="tickle()">
                <div class="stem"></div><div class="leaf"></div>
                <div class="orange-body">
                    <div class="brows-container">
                        <div class="brow brow-left"></div>
                        <div class="brow brow-right"></div>
                    </div>
                    <div class="flex"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Klonuna bir şeyler söyle..." onkeypress="if(event.key==='Enter') startProcess()">
            <div class="btn-send" onclick="startProcess()"><i class="fa-solid fa-paper-plane"></i></div>
        </div>
    </div>
</body>

</html>
