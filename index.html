<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portakal Klonunu Nasıl Eğitirsin? - Portakal v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'clone-trainer-default'; 
    const apiKey = ""; 
    const ADMIN_KEY = "admin.123."; 

    let memories = [];
    let isBusy = false;
    let currentKey = "";
    let timeLeft = 1800; 
    let timerInterval = null;
    let unsubscribeMemories = null;
    let unsubscribeAdmin = null;
    let isAdmin = false;

    window.deleteClone = async (id) => {
        if (!id) return;
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 z-[4000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4";
        modal.innerHTML = `
            <div class="bg-slate-900 border border-white/10 p-6 rounded-2xl max-w-xs w-full text-center">
                <h3 class="text-red-500 font-bold mb-2">Klonu Sil</h3>
                <p class="text-sm text-slate-300 mb-4"><span class="font-bold text-white">${id}</span> kimlikli klon kalıcı olarak silinecek. Onaylıyor musun?</p>
                <div class="flex gap-2">
                    <button id="cancel-delete-btn" class="w-1/2 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-bold text-white transition-colors">İPTAL</button>
                    <button id="confirm-delete-btn" class="w-1/2 py-2 bg-red-600 hover:bg-red-500 rounded-xl text-sm font-bold text-white transition-colors">SİL</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('cancel-delete-btn').onclick = () => modal.remove();
        document.getElementById('confirm-delete-btn').onclick = async () => {
            modal.remove();
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', id);
                await deleteDoc(docRef);
            } catch (e) {
                showModal("Hata", "Silme işlemi başarısız oldu.");
            }
        };
    };

    window.updateFact = async (id, idx) => {
        const newVal = document.getElementById(`input-${id}-${idx}`).value;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', id);
        const snap = await getDoc(docRef);
        if(!snap.exists()) return;
        let list = snap.data().list;
        list[idx] = newVal;
        await updateDoc(docRef, { list });
        showModal("Başarılı", "Hafıza hücresi güncellendi.");
    };

    window.deleteFact = async (id, idx) => {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', id);
        const snap = await getDoc(docRef);
        if(!snap.exists()) return;
        let list = snap.data().list;
        list.splice(idx, 1);
        await updateDoc(docRef, { list });
    };

    const authOverlay = document.getElementById('auth-overlay');
    const secretInput = document.getElementById('secretKey');
    const memoryList = document.getElementById('memory-list');
    const memCount = document.getElementById('mem-count');
    const chatBubble = document.getElementById('chat-bubble');
    const mouth = document.getElementById('mouth');
    const memoryPanel = document.getElementById('memory-panel');
    const adminPanel = document.getElementById('admin-panel');

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            return new Promise((resolve) => {
                const unsub = onAuthStateChanged(auth, (user) => {
                    if (user) { unsub(); resolve(user); }
                });
            });
        } catch (err) { return null; }
    };

    window.loadClone = async () => {
        const key = secretInput.value.trim().toLowerCase();
        if(!key || key.length < 3) {
            showModal("Hata", "Şifre en az 3 karakter olmalıdır.");
            return;
        }
        const veliOnay = document.getElementById('veliOnay');
        if (veliOnay && !veliOnay.checked) return showModal("Hata", "Devam etmek için veli onayını işaretlemelisin.");
        const btn = document.querySelector('.btn-start');
        const originalText = btn.innerText;
        btn.innerText = "BAĞLANTI KURULUYOR...";
        btn.disabled = true;

        const user = await initAuth();
        if (!user) {
            showModal("Hata", "Bulut erişimi reddedildi.");
            btn.innerText = originalText;
            btn.disabled = false;
            return;
        }

        if (key === ADMIN_KEY) {
            isAdmin = true;
            authOverlay.style.display = 'none';
            adminPanel.classList.remove('hidden');
            startAdminListener();
            return;
        }

        currentKey = key;
        const memoryDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', currentKey);
        const initialSnap = await getDoc(memoryDocRef);
        
        if (!initialSnap.exists()) {
            await setDoc(memoryDocRef, { list: [], created: new Date() }, { merge: true });
        }

        authOverlay.style.display = 'none';
        startTimer();

        if (unsubscribeMemories) unsubscribeMemories();
        
        unsubscribeMemories = onSnapshot(memoryDocRef, (snap) => {
            if(snap.exists()){
                memories = snap.data().list || [];
                refreshMemoryList();
            }
        }, (error) => {
            showModal("Erişim Hatası", "Hafıza dosyasına erişilemiyor.");
        });

        respond("Bağlantı başarılı! Seni dinliyorum eğitmenim.");
    };

    function startAdminListener() {
        const adminList = document.getElementById('admin-clone-list');
        adminList.innerHTML = '<div class="text-orange-500 animate-pulse text-center p-10 font-bold">CANLI BAĞLANTI KURULUYOR...</div>';
        
        const clonesCol = collection(db, 'artifacts', appId, 'public', 'data', 'clones');
        
        if (unsubscribeAdmin) unsubscribeAdmin();

        unsubscribeAdmin = onSnapshot(clonesCol, (snap) => {
            adminList.innerHTML = "";
            if (snap.empty) {
                adminList.innerHTML = '<div class="text-slate-500 text-center p-10 font-bold">SİSTEMDE HİÇ KLON BULUNAMADI.</div>';
                return;
            }

            snap.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const list = data.list || [];
                const card = document.createElement('div');
                card.className = "bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 hover:border-orange-500/30 transition-all";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
                        <span class="text-orange-500 font-bold"># ${id}</span>
                        <button onclick="window.deleteClone('${id}')" class="text-red-500 hover:text-red-400 text-xs font-bold uppercase tracking-tighter cursor-pointer px-2 py-1 bg-red-500/10 rounded-lg">KLONU SİL</button>
                    </div>
                    <div class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-2">
                        ${list.length > 0 ? list.map((m, idx) => `
                        <div class="flex gap-2 items-center bg-black/20 p-2 rounded-lg group">
                            <input type="text" value="${m}" id="input-${id}-${idx}" class="bg-transparent text-xs text-slate-300 flex-grow outline-none border-b border-transparent focus:border-orange-500">
                            <button onclick="window.updateFact('${id}', ${idx})" class="text-green-500 hidden group-hover:block text-[10px] font-bold">KAYDET</button>
                            <button onclick="window.deleteFact('${id}', ${idx})" class="text-red-500 hidden group-hover:block text-[10px] font-bold">SİL</button>
                        </div>
                        `).join('') : '<div class="text-[10px] text-slate-500 italic">Bu klonun hafızası henüz boş.</div>'}
                    </div>
                `;
                adminList.appendChild(card);
            });
        }, (error) => {
            adminList.innerHTML = `<div class="text-red-500 p-4">Canlı izleme hatası: ${error.message}</div>`;
        });
    }

    window.logout = () => {
        if(timerInterval) clearInterval(timerInterval);
        if(unsubscribeMemories) unsubscribeMemories();
        if(unsubscribeAdmin) unsubscribeAdmin();
        timeLeft = 1800;
        currentKey = "";
        memories = [];
        isAdmin = false;
        authOverlay.style.display = 'flex';
        secretInput.value = ""; 
        refreshMemoryList();
        const btn = document.querySelector('.btn-start');
        btn.innerText = "BAŞLAT";
        btn.disabled = false;
        adminPanel.classList.add('hidden');
    };

    const saveMemoryToCloud = async (newFact) => {
        if(!currentKey || !auth.currentUser) return;
        const memoryDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'clones', currentKey);
        try {
            const snap = await getDoc(memoryDocRef);
            const currentList = snap.exists() ? (snap.data().list || []) : [];
            if(currentList.includes(newFact)) return;
            const updatedMemories = [...currentList, newFact];
            await setDoc(memoryDocRef, { 
                list: updatedMemories, 
                lastUpdate: new Date()
            }, { merge: true });
        } catch(e) {}
    };

    window.startProcess = async () => {
        if (isBusy || !currentKey) return;
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        isBusy = true; 
        const originalBtn = document.querySelector('.btn-send').innerHTML;
        document.querySelector('.btn-send').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        
        const prompt = `Sen karizmatik, hafif alaycı ama sadık bir portakalsın. SENİN HAFIZAN: [${memories.join(" | ")}] KURAL: Hafızanda bilgi varsa onu kullan. Yoksa "Bunu henüz bilmiyorum, bana öğretir misin?" de. Eğer kullanıcı sana bir bilgi öğretiyorsa (Örn: "Adım Ahmet") JSON'da type: 'learn' yap. Girdi: "${text}" SADECE JSON: {"type": "learn" veya "question", "response": "sesli cevap", "fact": "hafızaya eklenecek kısa bilgi"}`;
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            const res = JSON.parse(data.candidates[0].content.parts[0].text);
            if(res.type === "learn") {
                await saveMemoryToCloud(res.fact || text);
                respond(res.response || "Bunu hafızama yazdım.");
            } else {
                respond(res.response);
            }
        } catch(e) { 
            respond("Zihinsel bir blokaj yaşıyorum.");
        }
        isBusy = false;
        document.querySelector('.btn-send').innerHTML = originalBtn;
        input.value = "";
    };

    function refreshMemoryList() {
        if(!memoryList) return;
        memoryList.innerHTML = memories.length > 0 
            ? memories.slice().reverse().map(m => `<div class="p-3 bg-white/5 rounded-lg text-xs mb-2 border-l-2 border-orange-500 animate-fadeIn">${m}</div>`).join("")
            : `<div class="text-slate-500 text-xs text-center py-4">Hafıza henüz boş.</div>`;
        if(memCount) memCount.innerText = memories.length;
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) { logout(); return; }
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const timerEl = document.getElementById('timer-val');
            if(timerEl) timerEl.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    window.toggleMemory = () => memoryPanel.classList.toggle('active');

    function respond(text) {
        chatBubble.innerText = text;
        chatBubble.style.display = 'block';
        speak(text);
        setTimeout(() => chatBubble.style.display = 'none', 6000);
    }

    const speak = async (text) => {
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                    }
                })
            });
            const data = await response.json();
            const pcmData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if(!pcmData) throw new Error("Audio data null");
            const binaryString = atob(pcmData);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavHeader = new Uint8Array(44);
            const view = new DataView(wavHeader.buffer);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + bytes.length, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); view.setUint32(40, bytes.length, true);
            const audio = new Audio(URL.createObjectURL(new Blob([wavHeader, bytes], { type: 'audio/wav' })));
            const activeMouths = document.querySelectorAll('.mouth');
            audio.onplay = () => activeMouths.forEach(m => m.classList.add('talking'));
            audio.onended = () => activeMouths.forEach(m => m.classList.remove('talking'));
            await audio.play();
        } catch (e) { fallbackSpeech(text); }
    };

    const fallbackSpeech = (text) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'tr-TR';
        const activeMouths = document.querySelectorAll('.mouth');
        u.onstart = () => activeMouths.forEach(m => m.classList.add('talking'));
        u.onend = () => activeMouths.forEach(m => m.classList.remove('talking'));
        window.speechSynthesis.speak(u);
    };

    function showModal(title, text) {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 z-[3000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4";
        modal.innerHTML = `
            <div class="bg-slate-900 border border-white/10 p-6 rounded-2xl max-w-xs w-full text-center">
                <h3 class="text-orange-500 font-bold mb-2">${title}</h3>
                <p class="text-sm text-slate-300 mb-4">${text}</p>
                <button onclick="this.parentElement.parentElement.remove()" class="w-full py-2 bg-slate-800 rounded-xl text-sm font-bold text-white">ANLADIM</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    document.addEventListener('mousemove', (e) => {
        const pupils = document.querySelectorAll('.pupil');
        const brows = document.querySelectorAll('.eyebrow');
        pupils.forEach((p, idx) => {
            if(!p)return;
            const rect = p.parentElement.getBoundingClientRect();
            const angle = Math.atan2(e.clientY - (rect.top + rect.height / 2), e.clientX - (rect.left + rect.width / 2));
            const dist = 6;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;
            p.style.transform = `translate(${tx}px, ${ty}px)`;
            const browIdx = Math.floor(idx / 2) * 2 + (idx % 2);
            if(brows[browIdx]) {
                brows[browIdx].style.transform = `translateY(${Math.min(ty, 0)}px) rotate(${tx * 2}deg)`;
            }
        });
    });

    window.onload = () => {
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
            starContainer.appendChild(star);
        }
    };

    window.tickle = (target) => {
        const container = target || document.getElementById('orange-container');
        container.classList.add('laughing');
        respond("Hahaha! Gıdıklanıyorum!");
        setTimeout(() => container.classList.remove('laughing'), 1500);
    };
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
    body { font-family: 'Space Grotesk', sans-serif; background: #020617; margin: 0; overflow: hidden; display: flex; height: 100vh; color: white; }
    .space-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .top-bar { position: fixed; top: 15px; right: 15px; display: flex; align-items: center; gap: 10px; z-index: 1000; }
    .memory-panel { width: 320px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 24px; z-index: 150; transition: transform 0.4s ease; }
    .main-stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
    .orange-container { position: relative; width: 220px; height: 220px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .orange-container.mini { width: 120px; height: 120px; }
    .stem { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 12px; height: 35px; background: #4d2c19; border-radius: 4px; z-index: 5; }
    .orange-container.mini .stem { width: 6px; height: 18px; top: -12px; }
    .leaf { position: absolute; top: -30px; left: 55%; width: 45px; height: 25px; background: linear-gradient(to right, #22c55e, #16a34a); border-radius: 0 50% 0 50%; transform: rotate(15deg); box-shadow: 2px 2px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    .orange-container.mini .leaf { width: 25px; height: 14px; top: -15px; }
    .orange-body { width: 100%; height: 100%; background: linear-gradient(135deg, #fb923c, #f97316); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 60px rgba(249, 115, 22, 0.3); border: 4px solid rgba(255,255,255,0.1); }
    .eyebrow { position: absolute; top: -15px; width: 35px; height: 6px; background: #440000; border-radius: 3px; }
    .orange-container.mini .eyebrow { width: 20px; height: 3px; top: -8px; }
    .eye-wrap { position: relative; margin: 0 15px; display: flex; flex-direction: column; align-items: center; }
    .orange-container.mini .eye-wrap { margin: 0 8px; }
    .eye { width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .orange-container.mini .eye { width: 22px; height: 22px; }
    .pupil { width: 18px; height: 18px; background: #0f172a; border-radius: 50%; }
    .orange-container.mini .pupil { width: 10px; height: 10px; }
    .mouth { position: absolute; bottom: 45px; width: 44px; height: 6px; border-bottom: 4px solid #440000; border-radius: 0 0 50% 50%; }
    .orange-container.mini .mouth { bottom: 15px; width: 24px; border-bottom-width: 2px; }
    .mouth.talking { animation: talk 0.15s infinite alternate; height: 20px; border-radius: 50%; background: #440000; }
    @keyframes talk { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1.3); } }
    .bubble { background: white; color: #0f172a; padding: 15px 22px; border-radius: 24px; position: absolute; top: -120px; width: 280px; text-align: center; display: none; font-weight: 600; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 3px solid #f97316; z-index: 100; }
    .input-area { position: absolute; bottom: 40px; width: 90%; max-width: 500px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 8px; border-radius: 24px; display: flex; border: 1px solid rgba(255,255,255,0.1); gap: 8px; }
    input { flex-grow: 1; border: none; outline: none; padding: 12px 15px; background: transparent; color: white; font-size: 16px; }
    .btn-send { background: #f97316; color: white; width: 48px; height: 48px; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .laughing { animation: shake 0.1s infinite; }
    @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.3); border-radius: 10px; }
    @media (max-width: 768px) { .memory-panel { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); } .memory-panel.active { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="space-bg" id="star-container"></div>
    <div class="top-bar">
        <div class="bg-black/40 backdrop-blur-md border border-white/10 px-4 py-2 rounded-2xl text-xs font-bold text-orange-400 shadow-xl">
            <i class="fa-solid fa-cloud-bolt mr-2 animate-pulse"></i><span id="timer-val">30:00</span>
        </div>
        <button onclick="logout()" class="bg-red-500/20 border border-red-500/40 w-10 h-10 rounded-2xl text-red-400 hover:bg-red-500 transition-all flex items-center justify-center">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>
    <div id="admin-panel" class="fixed inset-0 bg-slate-950/98 z-[2500] hidden flex flex-col p-6 overflow-y-auto custom-scrollbar">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                <div>
                    <h1 class="text-3xl font-black text-orange-500 tracking-tighter italic">KONTROL PANELİ</h1>
                    <p class="text-slate-400 text-xs uppercase tracking-widest font-bold">Veritabanı Yönetimi & Hafıza Silme</p>
                </div>
                <button onclick="logout()" class="px-6 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-2xl text-xs transition-all">PANELDEN ÇIK</button>
            </div>
            <div id="admin-clone-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>
    <div id="auth-overlay" class="fixed inset-0 bg-slate-950 z-[2000] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="max-w-sm w-full text-center">
            <div class="flex justify-center mt-8 mb-8">
                <div class="orange-container mini scale-110 rotate-12" id="auth-orange" onclick="tickle(this)">
                    <div class="stem"></div>
                    <div class="leaf"></div>
                    <div class="orange-body border-2">
                        <div class="flex">
                            <div class="eye-wrap">
                                <div class="eyebrow"></div>
                                <div class="eye"><div class="pupil"></div></div>
                            </div>
                            <div class="eye-wrap">
                                <div class="eyebrow"></div>
                                <div class="eye"><div class="pupil"></div></div>
                            </div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                </div>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-tighter text-white">KLON SİSTEMİ</h1>
            <p class="text-slate-400 mb-10 text-sm font-light">Bir şifre oluştur ve klonunu eğitmeye başla! Hafızan seninle kalsın.</p>
            <div class="space-y-4">
                <input type="password" id="secretKey" placeholder="Hafıza Şifresi" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 text-center text-xl tracking-[0.5em] focus:border-orange-500 transition-all outline-none text-white">
                <label class="flex items-start gap-3 bg-white/5 p-4 rounded-2xl border border-white/10 cursor-pointer text-left">
                    <input type="checkbox" id="veliOnay" class="mt-1 w-5 h-5 accent-orange-500 flex-shrink-0">
                    <span class="text-xs text-slate-300 leading-relaxed">
                        <span class="text-orange-400 font-bold">Veli Onayı:</span> Bu uygulamayı kullanmam için velim/ebeveynim izin vermiştir.
                    </span>
                </label>
                <button class="btn-start w-full bg-orange-600 hover:bg-orange-500 p-5 rounded-2xl font-bold text-lg transition-all active:scale-95 text-white" onclick="loadClone()">BAŞLAT</button>
            </div>
            <p class="mt-12 text-[10px] uppercase tracking-[0.2em] text-slate-500">Global Senkronizasyon v5.0</p>
        </div>
    </div>
    <div class="memory-panel" id="memory-panel">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-xl font-bold text-white">Hafıza</h2>
                <p class="text-[10px] text-orange-500 uppercase font-bold tracking-widest">Bulut Havuzu</p>
            </div>
            <div class="bg-orange-600/20 text-orange-500 w-10 h-10 rounded-xl flex items-center justify-center font-bold" id="mem-count">0</div>
        </div>
        <div id="memory-list" class="overflow-y-auto space-y-3 flex-grow pr-2 custom-scrollbar"></div>
        <button class="md:hidden mt-6 w-full p-4 bg-slate-800 rounded-2xl font-bold text-white" onclick="toggleMemory()">PANELİ KAPAT</button>
    </div>
    <div class="main-stage">
        <button class="md:hidden absolute top-4 left-4 z-50 p-4 bg-orange-600 rounded-2xl shadow-lg text-white" onclick="toggleMemory()">
            <i class="fa-solid fa-brain"></i>
        </button>
        <div class="relative">
            <div class="bubble" id="chat-bubble"></div>
            <div class="orange-container" id="orange-container" onclick="tickle(this)">
                <div class="stem"></div>
                <div class="leaf"></div>
                <div class="orange-body">
                    <div class="flex">
                        <div class="eye-wrap">
                            <div class="eyebrow" id="brow-l"></div>
                            <div class="eye"><div class="pupil" id="pupil-l"></div></div>
                        </div>
                        <div class="eye-wrap">
                            <div class="eyebrow" id="brow-r"></div>
                            <div class="eye"><div class="pupil" id="pupil-r"></div></div>
                        </div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Klonuna bir şeyler söyle..." onkeypress="if(event.key==='Enter') startProcess()">
            <div class="btn-send" onclick="startProcess()">
                <i class="fa-solid fa-paper-plane"></i>
            </div>
        </div>
    </div>
</body>
</html>
